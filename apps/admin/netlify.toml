# ─────────────────────────────────────────────────────────────────────────────
# Admin site netlify.toml
# Netlify site: myexpert-ops → admin.myexpert.com.ng
# Base directory on Netlify dashboard MUST be: apps/admin
# All paths below are relative to apps/admin (the base directory)
# ─────────────────────────────────────────────────────────────────────────────

[build]
  # npm --prefix ../.. runs install/build from the monorepo root (../../ from apps/admin)
  # This makes workspace packages available before the admin vite build runs
  command = "npm --prefix ../.. install && npm --prefix ../.. run build:admin"
  # publish is relative to the base directory (apps/admin), so this = apps/admin/dist
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS    = "--legacy-peer-deps"

# ── SPA fallback — ALL routes → index.html ───────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection       = "1; mode=block"

# ── Cache static assets ───────────────────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
