# ─────────────────────────────────────────────────────────────────────────────
# Admin site netlify.toml
# Netlify site: myexpert-ops → admin.myexpert.com.ng
# Base directory on Netlify dashboard MUST be set to: apps/admin
# ─────────────────────────────────────────────────────────────────────────────

[build]
  # cd up to the monorepo root so workspace packages are available,
  # then build only the admin workspace
  command = "cd ../../ && npm install && npm run build --workspace=apps/admin"
  # publish is relative to Base directory (apps/admin), so this = apps/admin/dist
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS    = "--legacy-peer-deps"

# ── SPA fallback — ALL routes → index.html ───────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection       = "1; mode=block"

# ── Cache static assets ───────────────────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
