<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- viewport-fit=cover is REQUIRED for env(safe-area-inset-*) to work on iOS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme / status bar -->
    <meta name="theme-color" content="#7c3aed" />
    <meta name="msapplication-TileColor" content="#7c3aed" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MyExpert" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <!-- Android / general -->
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <!-- SEO -->
    <title>MyExpert — Skilled hands you can actually trust</title>
    <meta name="description" content="Find verified plumbers, tailors, mechanics &amp; more — booked in minutes, paid only when the job is done." />
    <meta property="og:title"       content="MyExpert" />
    <meta property="og:description" content="Find verified skilled workers near you — booked in minutes, paid only when done." />
    <meta property="og:type"        content="website" />
    <meta property="og:image"       content="/icon.svg" />
    <meta name="twitter:card"       content="summary" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
